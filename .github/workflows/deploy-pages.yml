name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NITRO_PRESET: static
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - name: Prepare static output for GitHub Pages
        run: |
          echo "=== .output tree ==="
          ls -R .output | head -120 || true
          cd .output/public
          if [ ! -f index.html ] && [ -f _shell.html ]; then cp _shell.html index.html; fi
          if [ -f index.html ]; then cp index.html 404.html; fi
          touch .nojekyll
          echo "=== public/ after prep ==="
          ls -la
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
